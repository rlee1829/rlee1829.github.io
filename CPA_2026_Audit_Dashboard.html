  {"id":78,"section":"Revenue","risk":"HR","wsEN":"Each C&E Function has a Banquet Event Order (BEO) sheet. Reconciliation between the PMS / POS postings and the BEO is performed and discrepancies are documented and followed up to resolution.","wsKR":"각 C&E Function(연회 및 이벤트) 행사별로 Banquet Event Order(BEO - 연회 행사 지시서)가 있어야 한다. PMS/POS에 포스팅된 매출 내역과 BEO 간의 Reconciliation(대조)이 수행되어야 하며 불일치 사항은 문서화되어 해결될 때까지 추적 관리되어야 한다.","tsEN":"Obtain the C&E function tracker (preferably a system generated report) and select 3 high value functions. Verify the control as defined in the Work Step column.","tsKR":"C&E 행사 트래커(가능한 경우 시스템 생성 보고서)를 확보하고 3건의 고액 행사를 선정해야 한다. Work Step 열에 정의된 통제 절차가 이행되었는지 확인해야 한다. CPA 검증 목적으로 해당 월 및 테스트한 샘플을 테스트 시트에 입력해야 한다.","pol":"FP-OPSFIN-130 Revenue Reconciliation"},
  {"id":79,"section":"Revenue","risk":"HR","wsEN":"The Income Auditor (or equivalent) distributes all duty meal checks or a summary of duty meals and entertainment / promotional F&B charges for approval,within 2 weeks, to the Operations Leader and the Finance Leader, at a minimum. The approved documentation is retained.","wsKR":"Income Auditor(매출 심사원 또는 이에 준하는 담당자)는 모든 Duty meal(근무용 식사) 전표 또는 Duty meal 요약본과 접대/판촉용 식음료 비용 내역을 최소 2주 이내에 Operations Leader와 Finance Leader에게 배포하여 승인을 받아야 한다. 승인된 서류는 보관되어야 한다.","tsEN":"Select 3 days to obtain the summary of duty meals and entertainment / promotional F&B charges,  verify the control as defined in the Work Step column.","tsKR":"3일을 선정하여 근무용 식사 요약본과 접대/판촉용 식음료 비용 내역을 확보하고 Work Step 열에 정의된 통제 절차가 이행되었는지 확인해야 한다.","pol":"FP-OPSFIN-132	Entertainment, Promotional, and Duty Meals"},
  {"id":80,"section":"Revenue","risk":"HR","wsEN":"Verify that rooms provided under trade-out arrangements, promotional packages (e.g., buy two, get one free), or as group contract incentives (e.g., one free room per 50 booked) are not classified as complimentary. These rooms should be classified as one of the revenue categories (transient, group, or contract) and are considered when calculating Occupancy Percentage.","wsKR":"바터 계약(Trade-out arrangement), 판촉 패키지(예: 2박 시 1박 무료), 또는 단체 계약 인센티브(예: 50객실 예약당 1객실 무료)에 따라 제공되는 객실이 Complimentary(무료 객실)로 분류되지 않았는지 확인해야 한다. 이러한 객실은 매출 카테고리(개인, 단체 또는 계약) 중 하나로 분류되어야 하며 객실 가동률(Occupancy Percentage)을 계산할 때 포함되어 산정되어야 한다.","tsEN":"Select 3 sample from group contracts with free rooms/promotion package, or barter agreements. Review the revenue report for the corresponding dates and verify that the controls defined in the Work Step column.","tsKR":"무료 객실/판촉 패키지가 포함된 단체 계약 또는 바터 계약 샘플 3건을 선정해야 한다. 해당 날짜의 Revenue 보고서를 검토하고 Work Step 열에 정의된 통제 절차를 검증해야 한다.","pol":"SOP-OPSFIN-234 Rooms Statistics"}

function getPdfUrl(pol){
  var code=pol.trim().split(/[\s\t]+/)[0];
  var f=PDF_MAP[code];
  if(!f) return null;
  return PDF_FOLDER+encodeURIComponent(f);
}

var curFlt='all';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getItems(){
  var items;
  if(viewMode==='findings'){
    items=auditData.filter(function(i){return results[i.id]==='no';});
  } else {
    items=auditData.filter(function(i){return i.section===curSec;});
  }
  if(curFlt==='key') items=items.filter(function(i){return i.risk==='Key';});
  else if(curFlt==='pend') items=items.filter(function(i){return !results[i.id];});
  return items;
}

function buildNav(){
  var html='';
  SECS.forEach(function(s){
    var si=auditData.filter(function(i){return i.section===s;});
    var done=si.filter(function(i){return results[i.id];}).length;
    var cls=(viewMode!=='findings'&&curSec===s)?' active':'';
    html+='<div class="tab'+cls+'" onclick="selSec(\''+s.replace(/'/g,"\\'")+'\')">'
      +esc(s)+'<span class="tn">'+done+'/'+si.length+'</span></div>';
  });
  var nc=auditData.filter(function(i){return results[i.id]==='no';}).length;
  var fc=(viewMode==='findings')?' active ftab':' ftab';
  html+='<div class="tab'+fc+'" onclick="selFindings()">Findings'
    +'<span class="tn" style="'+(nc>0?'background:#fde8ea;color:#dc3545':'')+'">'
    +nc+'</span></div>';
  var bsc=(viewMode==='bsguide')?' active ftab':' ftab';
  html+='<div class="tab'+bsc+'" onclick="selBSGuide()" style="color:#1a2456">BS Guide'
    +'<span class="tn" style="background:#e8f0fe;color:#1a2456">39</span></div>';
  document.getElementById('tabs').innerHTML=html;
}

function updPrg(){
  var total=auditData.length;
  var yc=auditData.filter(function(i){return results[i.id]==='yes';}).length;
  var nc=auditData.filter(function(i){return results[i.id]==='no';}).length;
  var ac=auditData.filter(function(i){return results[i.id]==='na';}).length;
  var done=yc+nc+ac;
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('ptx').textContent=done+' / '+total+' ('+pct+'%)';
  document.getElementById('ps').innerHTML=
    '<div class="prg-s"><span class="pdot" style="background:#198754"></span>Yes: '+yc+'</div>'
    +'<div class="prg-s"><span class="pdot" style="background:#dc3545"></span>No: '+nc+'</div>'
    +'<div class="prg-s"><span class="pdot" style="background:#6c757d"></span>N/A: '+ac+'</div>'
    +'<div class="prg-s"><span class="pdot" style="background:#dee2e6"></span>Pending: '+(total-done)+'</div>';
  // BS Guide separate progress
  if(typeof bsData!=='undefined'){
    var bsTotal=bsData.length;
    var bsYc=bsData.filter(function(i){return bsResults[i.id]==='yes';}).length;
    var bsNc=bsData.filter(function(i){return bsResults[i.id]==='no';}).length;
    var bsAc=bsData.filter(function(i){return bsResults[i.id]==='na';}).length;
    var bsDone=bsYc+bsNc+bsAc;
    var bsPct=bsTotal?Math.round(bsDone/bsTotal*100):0;
    var bsPfEl=document.getElementById('bs-pf');
    var bsPtxEl=document.getElementById('bs-ptx');
    var bsPsEl=document.getElementById('bs-ps');
    if(bsPfEl)bsPfEl.style.width=bsPct+'%';
    if(bsPtxEl)bsPtxEl.textContent=bsDone+' / '+bsTotal+' ('+bsPct+'%)';
    if(bsPsEl)bsPsEl.innerHTML=
      '<div class="prg-s"><span class="pdot" style="background:#198754"></span>Yes: '+bsYc+'</div>'
      +'<div class="prg-s"><span class="pdot" style="background:#dc3545"></span>No: '+bsNc+'</div>'
      +'<div class="prg-s"><span class="pdot" style="background:#6c757d"></span>N/A: '+bsAc+'</div>'
      +'<div class="prg-s"><span class="pdot" style="background:#dee2e6"></span>Pending: '+(bsTotal-bsDone)+'</div>';
  }
}

function buildLP(){
  if(viewMode==='bsguide'){buildBSLP();return;}
  var items=getItems();
  var html='';
  if(viewMode==='findings'){
    if(items.length===0){
      html='<div style="padding:20px;text-align:center;color:#6c757d;font-size:12px;">No findings (No) yet</div>';
    } else {
      var secs=[];
      items.forEach(function(i){if(secs.indexOf(i.section)===-1)secs.push(i.section);});
      secs.forEach(function(s){
        html+='<div class="lsl">'+esc(s)+'</div>';
        items.filter(function(i){return i.section===s;}).forEach(function(item,idx){html+=mkLI(item,idx+1);});
      });
    }
  } else {
    if(items.length===0){
      html='<div style="padding:20px;text-align:center;color:#6c757d;font-size:12px;">No items match filter</div>';
    } else {
      items.forEach(function(item,idx){html+=mkLI(item,idx+1);});
    }
  }
  document.getElementById('lp').innerHTML=html;
  if(curId){var el=document.getElementById('li-'+curId);if(el)el.scrollIntoView({block:'nearest'});}
}

function mkLI(item,num){
  var res=results[item.id]||'';
  var dc,dt;
  if(res==='yes'){dc='dy';dt='Y';}
  else if(res==='no'){dc='dn';dt='N';}
  else if(res==='na'){dc='dna';dt='-';}
  else{dc='dnone';dt=num||'?';}
  var bc=item.risk==='Key'?'bk':'bh';
  var tx=lang==='ko'?item.wsKR:(lang==='ja'?(JP_WS[item.id]||item.wsEN):item.wsEN);
  var lines=tx.split('\n').filter(function(l){return l.trim();});
  var title=lines[0]||'';
  if(title.length>75)title=title.substring(0,75)+'...';
  var ac=(curId===item.id)?' act':'';
  return '<div class="li'+ac+'" id="li-'+item.id+'" onclick="selItem('+item.id+')">'
    +'<div class="ldot '+dc+'">'+esc(res?dt:num)+'</div>'
    +'<div class="lbadge '+bc+'">'+esc(item.risk)+'</div>'
    +'<div class="ltx">'+esc(title)+'</div>'
    +'</div>';
}

function isMob(){return window.innerWidth<=768;}
function setMobView(v){
  var ct=document.getElementById('ct');
  if(!ct)return;
  ct.classList.remove('mob-list','mob-detail');
  if(isMob())ct.classList.add('mob-'+v);
}
function backToList(){setMobView('list');}

function selSec(s){
  viewMode='section'; curSec=s; curFlt='all'; setMobView('list');
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('act','kact');});
  document.getElementById('flt-all').classList.add('act');
  buildNav(); buildLP();
  var items=getItems();
  if(items.length>0){
    if(!curId||!items.find(function(i){return i.id===curId;}))selItem(items[0].id);
    else buildRP();
  } else {curId=null;buildRP();}
}

function selFindings(){
  viewMode='findings'; curFlt='all'; setMobView('list');
  buildNav(); buildLP();
  var items=getItems();
  if(items.length>0)selItem(items[0].id);
  else{curId=null;buildRP();}
}

function setFlt(f){
  curFlt=f;
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('act','kact');});
  var b=document.getElementById('flt-'+f);
  if(b)b.classList.add(f==='key'?'kact':'act');
  buildLP();
  var items=getItems();
  if(items.length>0&&!items.find(function(i){return i.id===curId;}))selItem(items[0].id);
  else buildRP();
}

function setRes(id,val){
  if(results[id]===val){
    delete results[id];
    delete tstamps[id];
  } else {
    results[id]=val;
    if(!tstamps[id]){
      var d=new Date();
      var pad=function(n){return n<10?'0'+n:''+n;};
      tstamps[id]=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    }
  }
  save(); updPrg(); buildNav(); buildLP(); buildRP();
}

function setNote(id,val){notes[id]=val;saveDbc();}
function setSamp(id,val){samples[id]=val;saveDbc();}

var _st=null;
function saveDbc(){clearTimeout(_st);_st=setTimeout(save,900);}

function save(){
  try{
    var d={results:results,notes:notes,samples:samples,tstamps:tstamps,
      bsResults:bsResults,bsChecks:bsChecks,bsNotes:bsNotes,
      hotel:{hotel:document.getElementById('hi-hotel').value,
             date:document.getElementById('hi-date').value,
             auditor:document.getElementById('hi-auditor').value,
             period:document.getElementById('hi-period').value}};
    localStorage.setItem('cpa2026v2',JSON.stringify(d));
    var si=document.getElementById('si');
    si.textContent='✓ Saved';
  }catch(e){}
}
function saveHI(){saveDbc();}

function loadStore(){
  try{
    var raw=localStorage.getItem('cpa2026v2');
    if(!raw)return;
    var d=JSON.parse(raw);
    results=d.results||{};notes=d.notes||{};samples=d.samples||{};tstamps=d.tstamps||{};
    bsResults=d.bsResults||{};bsChecks=d.bsChecks||{};bsNotes=d.bsNotes||{};
    if(d.hotel){
      ['hotel','date','auditor','period'].forEach(function(k){
        var el=document.getElementById('hi-'+k);
        if(el&&d.hotel[k])el.value=d.hotel[k];
      });
    }
  }catch(e){}
}

function toggleLang(){
  lang=lang==='ko'?'en':(lang==='en'?'ja':'ko');

function resetAll(){
  if(!confirm('Reset all results? This cannot be undone.'))return;
  results={};notes={};samples={};tstamps={};

}

function exportCSV(){
  var hotel=document.getElementById('hi-hotel').value||'Hotel';
  var date=document.getElementById('hi-date').value||new Date().toISOString().slice(0,10);
  var BOM='﻿';
  var hdr=['No','Section','Risk','Work Step (EN)','Test Step (EN)','Policy Reference','Result','Sample Tested','Notes'].join(',');
  var rows=[hdr];
  auditData.forEach(function(item,idx){
    var res=results[item.id]||'';
    var nt=(notes[item.id]||'').replace(/"/g,'""').replace(/[\r\n]+/g,' ');
    var sp=(samples[item.id]||'').replace(/"/g,'""');
    var we=item.wsEN.replace(/"/g,'""').replace(/[\r\n]+/g,' ');
    var te=item.tsEN.replace(/"/g,'""').replace(/[\r\n]+/g,' ');
    var po=item.pol.replace(/"/g,'""');
    rows.push([idx+1,'"'+item.section+'"','"'+item.risk+'"','"'+we+'"','"'+te+'"','"'+po+'"','"'+res+'"','"'+sp+'"','"'+nt+'"'].join(','));
  });
  var csv=BOM+rows.join('\r\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='CPA2026_'+hotel.replace(/\s+/g,'_')+'_'+date+'.csv';
  a.click();URL.revokeObjectURL(url);
}

// ===== BS GUIDE FUNCTIONS =====
function selBSGuide(){
  viewMode='bsguide'; curFlt='all'; curBsId=null; setMobView('list');
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('act','kact');});
  var ball=document.getElementById('flt-all');if(ball)ball.classList.add('act');
  buildNav(); buildBSLP();
  if(bsData.length>0&&!isMob())selBSItem(bsData[0].id);
  else{document.getElementById('rp').innerHTML='<div class="empty"><div class="empty-icon">&#9776;</div><div class="empty-tx">Select an item</div></div>';}
}

function selBSItem(id){
  curBsId=id;
  buildBSLP();
  buildBSRP();
  setMobView('detail');
}

function buildBSLP(){
  var html='';
  var cats=['ASSETS','LIABILITIES'];
  cats.forEach(function(cat){
    var items=bsData.filter(function(i){return i.cat===cat;});
    html+='<div class="lsl">'+cat+'</div>';
    items.forEach(function(item){
      var res=bsResults[item.id]||'';
      var dc,dt;
      if(res==='yes'){dc='dy';dt='Y';}
      else if(res==='no'){dc='dn';dt='N';}
      else if(res==='na'){dc='dna';dt='-';}
      else{dc='dnone';dt=item.num;}
      var chks=bsChecks[item.id]||{};
      var done=item.checks.filter(function(c,i){return chks[i];}).length;
      var pct=item.checks.length?Math.round(done/item.checks.length*100):0;
      var ac=(curBsId===item.id)?' act':'';
      var accountTx=item.account?'<span style="color:var(--mu);font-size:9px;"> ('+esc(item.account)+')</span>':'';
      html+='<div class="li'+ac+'" id="bsli-'+item.id+'" onclick="selBSItem(\''+item.id+'\')">'
        +'<div class="ldot '+dc+'">'+esc(dc==='dnone'?String(item.num):dt)+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div class="ltx">'+esc(item.title)+accountTx+'</div>'
        +'<div style="margin-top:3px;height:3px;background:#e9ecef;border-radius:2px;overflow:hidden">'
        +'<div style="width:'+pct+'%;height:100%;background:var(--g);border-radius:2px"></div>'
        +'</div>'
        +'</div>'
        +'</div>';
    });
  });
  document.getElementById('lp').innerHTML=html;
  if(curBsId){var el=document.getElementById('bsli-'+curBsId);if(el)el.scrollIntoView({block:'nearest'});}
}

function buildBSRP(){
  var rp=document.getElementById('rp');
  if(!curBsId){
    rp.innerHTML='<div class="empty"><div class="empty-icon">&#9776;</div><div class="empty-tx">왼쪽에서 항목을 선택하세요</div></div>';
    return;
  }
  var item=bsData.find(function(i){return i.id===curBsId;});
  if(!item)return;
  var res=bsResults[item.id]||'';
  var note=bsNotes[item.id]||'';
  var chks=bsChecks[item.id]||{};

  // Policy PDF buttons
  var pdfBtns='';
  if(item.policy.length>0){
    item.policy.forEach(function(pol){
      var pdfUrl=getPdfUrl(pol);
      if(pdfUrl){
        pdfBtns+='<a href="'+pdfUrl+'" target="_blank" class="btnpdf" style="margin-right:4px">&#128196; '+esc(pol)+'</a>';
      } else {
        pdfBtns+='<span class="poltag" style="margin-right:4px">'+esc(pol)+'</span>';
      }
    });
  }
  var pdfPage=item.num<=21?item.num+3:item.num+4;
  var bsPdfUrl='Balance%20Sheet%20Reconciliations%20Guide%20APAC.pdf#page='+pdfPage;

  // Docs list
  var docsHtml='<ul style="margin:0;padding-left:18px;">';
  item.docs.forEach(function(d){docsHtml+='<li style="font-size:12px;line-height:1.7;color:var(--tx)">'+esc(d)+'</li>';});
  docsHtml+='</ul>';

  // Checkpoints
  var checksHtml='';
  item.checks.forEach(function(c,i){
    var checked=chks[i]?true:false;
    checksHtml+='<label class="bscheck-item'+(checked?' bscheck-done':'')+'">'
      +'<input type="checkbox"'+(checked?' checked':'')+' onchange="toggleBSCheck(\''+item.id+'\','+i+',this.checked)" style="margin-right:8px;flex-shrink:0;width:15px;height:15px;cursor:pointer;accent-color:var(--p)">'
      +'<span>'+esc(c)+'</span>'
      +'</label>';
  });
  var doneCount=item.checks.filter(function(c,i){return chks[i];}).length;
  var pct=item.checks.length?Math.round(doneCount/item.checks.length*100):0;

  var html='<button class="mob-back" onclick="backToList()">&#8592; 목록으로</button>'
    +'<div class="dcard">'
    +'<div class="dhdr" style="gap:8px">'
    +'<div style="min-width:0;flex:1">'
    +'<div style="font-size:10px;opacity:.6;margin-bottom:3px">'+esc(item.cat)+' #'+item.num+(item.account?' &bull; GL: '+esc(item.account):'')+'</div>'
    +'<div style="font-size:16px;font-weight:700;color:#fff">'+esc(item.title)+'</div>'
    +'<div style="font-size:11px;color:var(--gl);margin-top:4px;opacity:.85">&#9888; '+esc(item.risk)+'</div>'
    +'</div>'
    +'<div style="flex-shrink:0;text-align:right">'
    +'<a href="'+bsPdfUrl+'" target="_blank" class="btnpdf" style="background:var(--g);color:var(--p);display:block;margin-bottom:4px">&#128214; BS Guide PDF</a>'
    +(pdfBtns?'<div style="margin-top:4px">'+pdfBtns+'</div>':'')
    +'</div>'
    +'</div>'
    +'<div class="dbody">'
    +'<div class="fl">필수 첨부 서류</div>'
    +docsHtml
    +'<div class="fl" style="margin-top:14px">리뷰어 체크 포인트 &mdash; <span style="font-weight:400;color:var(--mu)">'+doneCount+'/'+item.checks.length+' 완료 ('+pct+'%)</span></div>'
    +'<div style="height:4px;background:#e9ecef;border-radius:2px;margin-bottom:10px;overflow:hidden">'
    +'<div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,var(--p),var(--g));border-radius:2px;transition:width .3s"></div>'
    +'</div>'
    +'<div class="bscheck-list">'+checksHtml+'</div>'
    +'<div class="rssec">'
    +'<div class="rsrow"><span class="rslbl">종합 결과:</span>'
    +'<button class="rsb rby'+(res==='yes'?' act':'')+'" onclick="setBSRes(\''+item.id+'\',\'yes\')">Yes</button>'
    +'<button class="rsb rbn'+(res==='no'?' act':'')+'" onclick="setBSRes(\''+item.id+'\',\'no\')">No</button>'
    +'<button class="rsb rbna'+(res==='na'?' act':'')+'" onclick="setBSRes(\''+item.id+'\',\'na\')">N/A</button>'
    +'</div>'
    +'<div class="ig ignotes" style="width:100%"><label>메모 / 발견 사항</label>'
    +'<textarea placeholder="발견 사항, 증거 자료, 특이사항..." oninput="setBSNote(\''+item.id+'\',this.value)" style="width:100%">'+esc(note)+'</textarea></div>'
    +'</div>'
    +'</div></div>';
  rp.innerHTML=html;
}

function setBSRes(id,val){
  if(bsResults[id]===val){delete bsResults[id];}
  else{bsResults[id]=val;}
  save(); updPrg(); buildBSLP(); buildBSRP();
}

function toggleBSCheck(id,idx,checked){
  if(!bsChecks[id])bsChecks[id]={};
  if(checked)bsChecks[id][idx]=true;
  else delete bsChecks[id][idx];
  saveDbc(); buildBSLP();
  // Update just the progress bar in RP without full rebuild
  var item=bsData.find(function(i){return i.id===id;});
  if(item){
    var chks=bsChecks[id]||{};
    var doneCount=item.checks.filter(function(c,i){return chks[i];}).length;
    var pct=item.checks.length?Math.round(doneCount/item.checks.length*100):0;
    var bars=document.querySelectorAll('.dbody .bscheck-list');
    if(bars.length>0){
      var prevBar=bars[0].previousElementSibling;
      if(prevBar&&prevBar.style&&prevBar.firstElementChild){
        prevBar.firstElementChild.style.width=pct+'%';
      }
    }
    var lbl=document.querySelector('.fl + div + div + .fl');
    // just rebuild RP for accuracy
    buildBSRP();
  }
}

function setBSNote(id,val){bsNotes[id]=val;saveDbc();}

  18: '月次にて与信会議を開催し、運営責任者および財務責任者が出席のうえ、ARエイジングレポート、ハウスアカウント、グループマスター、前回会議議事録のフォローアップ等、すべての与信課題をポリシーに基づきレビュー・討議する。議事録を作成し、出席者を明記する。',
  19: 'クレジットカード端末で返金を行う場合、返金処理権限は十分に制限されていること（少なくともスーパーバイザーまたはマネージャー）を確認する。',
  20: 'デポジットはポリシーおよび契約条件に従って管理する。ポリシーに則らないデポジットは承認および文書化が必要。政治関連イベントは事前全額支払、社交イベント／プロモーション会議は事前に50％のデポジットが必要であることを確認する。',
  21: '独立した財務チームメンバー（クレジットカード返金処理権限を持たない者）が、すべてのクレジットカード返金を管理・レビューする。',
  22: 'すべての与信申請書には、ポリシーで定義された情報源による信用評価が含まれ、宿泊／イベント開始前に承認されていること。一時的/1回限りの与信や例外はポリシーに従い承認され、管理職承認済みの申請書は保管されていること。',
  23: '年次与信レビュー：ホテル経営陣は、すべての売掛顧客をレビューし、翌年度も与信を付与するかを判断する。リストは財務部長、コマーシャルダイレクター/マネージャー、総支配人が署名し、保管されていること。',
  24: 'ホテルはいかなる紙媒体・電子媒体においても完全なクレジットカード情報を保存してはならない。完全なカード番号を保存できる唯一の場所は、PMS内の暗号化された専用フィールドのみとする。完全なカード番号を含む承認書類等は直ちに削除し、今後使用を禁止する。',
  25: '毎月、貸倒引当金の計算が財務責任者によってレビュー、承認され、日付が付されているかを確認する。ポリシーからの逸脱または例外は、計算ワークシートに明記され、適切な裏付資料および追加の例外承認が添付されていることを確認する。 注： 検討対象には、該当する場合、クレジットカードのチャージバック、返還された小切手、30日以上超過のハウスアカウントおよびグループマスター残高を含める。 引当金額を算定する前に、貸方残高が（滞留期間別に）合計額へ戻し入れられていることを確認する。',
  26: '月内に金額変動/動きのあったすべてのクリアリングアカウントおよび残高ゼロのアカウントをレビューする。 i) すべてのクリアリングアカウントが、本来の目的に沿って使用されており、残高が翌月に清算されていることを確認する。 ii) 各勘定の増減についてレビューが実施され、適切な裏付資料および詳細がBalance Sheet Reconciliationに含まれていることを確認する。',
  27: '利用可能な最新のBalance Sheet Reconciliationをすべて取得する。 i) Reconciliationに、識別された差異、適切な裏付資料およびコメントを含むリードシートが含まれていることを確認する。 ii) すべてのReconciliationが、FP‑OPSFIN‑100で定める権限レベルに基づき、独立した担当者により適時（翌月20営業日以内）にレビュー／承認されていることを確認する。',
  28: 'Balance Sheet項目における他の質問で個別にレビューされていないBS勘定について、活動／変動内容を説明するのに十分な補足資料が添付または相互参照され、期末残高が総勘定元帳（GL）と一致していることを確認する。併せて、勘定残高が資産および負債として適切に分類されていることを確認する。',
  29: 'すべての未払勘定および補足資料をレビューし、未払費用が合理的であり、当月に受領した商品またはサービスに対してのみ計上されていることを確認する。',
  30: 'オーナー関連勘定に滞留残高やフォローアップを要する金額がないことを確認する。該当がある場合、適切な裏付資料があり、リージョナルマネジメントへ報告されていることを確認する。',
  31: 'すべての繰延収益勘定（会員費、年会費、退会時返還金、解約料等）に適切な裏付資料があることを確認し、収益認識方法の妥当性をレビューする。',
  32: 'ギフトカード／ギフト券を追跡するための詳細な明細表が存在し、該当するBalance Sheet Reconciliationの裏付資料として使用され、Balance Sheet Reconciliationのリードシートと一致していることを確認する。',
  33: 'オーナー分配および出資が適切に裏付けられ、共有・追跡されていることを確認する。直近30日間の分配および出資の算定根拠を確認し、マネジメント契約に沿って実施されているか検証する。',
  34: 'すべての前払／減価償却／償却スケジュールが、耐用期間および消費状況を追跡できる十分な詳細を備え、ホテルの全前払項目を網羅していることを確認する。以下を含み、毎月GLと照合されていることを確認する。 i) 費用内容および該当するGLコード ii) サプライヤー iii) 費用配分期間 iv) 総額、月次損益計上額、残存前払残高',
  35: 'その他債権勘定および調整資料をレビューし、未回収残高の妥当性と文書化の適切性を確認する。滞留しているその他債権について、十分な裏付資料と回収手続が整備されていることを確認する。',
  36: 'その他負債勘定をすべてレビューし、Reconciliationに適切な根拠および裏付資料が添付されていることを確認する。',
  37: '2か月分のサプライヤー支払から各1件のEFTを抽出し、選定した各EFTについて、2名の独立した担当者が起案および承認していること、ならびに支払実行の裏付資料が存在することを確認する。',
  38: '合計2,000米ドル以上の各ハウスファンドが毎月監査されているか、毎月少なくとも50％が監査されているか、各ハウスファンドが少なくとも3か月に1回（または現金機へ入金し日次でのレビュー）監査されているかを確認する。',
  39: '現金回収が専門警備会社または銀行により直接実施され、週1回以上行われていることを確認する。日々の入金ごとの容器／改ざん防止袋が個別に記録され、装甲輸送サービス／専門警備会社により署名されていることを確認する。',
  40: '日次でジェネラルキャッシャーレポートが作成され、日次売上総額ごとに別個の入金伝票が作成され、日々の入金が個別の容器／改ざん防止袋で管理されていることを確認する。',
  41: '電子送金（EFT）の銀行権限を取得し、EFTの起案および承認を行う権限者が、職務および責任に照らして適切であることを確認する。',
  42: 'すべての返金は、当初の支払方法と同一の方法で実施されている（例：現金→現金、クレジットカード→同一カード、WeChat／Alipay→同一手段等）。 すべてのクレジットカード返金は、当初チャージされた同一カード番号に計上され、PMSに記録されている。',
  43: 'リージョナル・ファイナンス・ディレクター、オペレーションズ・ファイナンスVP、エリアVP、ヒルトン・アセットマネジメントおよびオーナー・リレーションズ部門の書面承認なしに、 i) FF&E積立金をFF&E購入以外に使用していないこと。 ii) いかなる当事者への貸付または分配を実施していないこと。',
  44: '帳簿管理システムとPeoplesoft間の試算表照合レポートを2か月分取得し、財務責任者が日付付きでレビューしていること、月次締日前に差異が調査・文書化・解決されていることを確認する。最終ファイルは第4営業日までに提出されていることを確認する。',
  45: '現金照合は、週次で完了し、財務責任者（またはそれに相当する者）によりレビューされていることを確認する。すべての照合項目が調査、解決、記録されていることを確認する。',
  46: '月末締め前に仕訳がレビュー・承認されていることを確認する。 補足資料が添付または相互参照されていること、仕訳の根拠として十分であること、ならびに仕訳金額と一致していることを確認すること。 注：CheckSCM に関連する仕訳については、適切かつ独立した担当者によって承認されていること。',
  47: '棚卸について、実計数とシステム残高との差異について、財務部門により差異分析が実施されており、すべての差異が適切に調査・フォローアップされていることを確認すること。 また、棚卸結果に基づく在庫調整については、財務責任者の承認を得たうえで、該当月に調整処理が行われていることを確認すること。',
  48: '在庫の棚卸が以下のとおり適切に実施されていることを確認すること。 i) すべての棚卸は、少なくとも2名1組で実施されること。1名は倉庫管理担当チームメンバーまたは料飲部門チームメンバーであり、もう1名は財務部門のチームメンバーまたは財務責任者により承認された独立したチームメンバーである。 ii) 計数表には、数量が事前に入力されていない状態で、棚卸対象品目が記載されていること（システム残・あるべき残などは記載しておかないこと）。 iii) 計数完了後、棚卸チームの全メンバーが、カウントおよび記録された数量に同意したことを確認するため、署名および日付をもって棚卸表を承認すること。 iv) 棚卸集計結果のシステム入力は、実地棚卸に関与していない独立したチームメンバーが行うこと。',
  49: '定期的な仕訳について、仕訳の内容／名称および仕訳作成担当者を明示した月次チェックリストが作成・使用されていること。すべての定期的な仕訳が漏れなく計上されていることを確認すること。 また、当該チェックリストが月次決算締め作業の完了前に、財務責任者によって署名および日付記入のうえ承認されていることを確認すること。',
  50: '直近の 012 MPR レポートのサンプルを2件入手し、以下の点を検証すること。 i) レポート上でコメントが要求されるすべての業績指標および特定された差異について、適切なコメントが付されており、重要または通常と異なる差異については調査が実施されていること。 ii) 当該レポートが財務責任者（またはオペレーション責任者）により承認されており、関連する補足資料とともに保存されていること。',
  51: '以下の最低要件に従って月次残高照合が実施されていること、ならびに月次決算時点において財務責任者（または同等の責任者）によるレビューおよび承認の証跡が保存されていることを確認すること。 i) Bank Reconciliationは、当該口座の署名権限者ではない者によって作成されていること。 ii) 照合様式は「銀行残高から帳簿残高（Bank to Book）を確認する」方式とし、銀行残高に対して総勘定元帳残高を照合する形式であること。 iii) 銀行取引明細書、またはネットバンキングシステムから出力した明細書を、照合資料として添付していること。 iv) 未決済小切手の一覧を含めていること。現地の銀行関連法令により制限されていない限り、すべての未決済小切手は6か月経過後に無効処理されること。財務責任者は、ホテルが現地の未請求財産（Unclaimed Property）に関するすべての法令を遵守していることを確認する責任を負う。 v) 月末時点で総勘定元帳には計上されているが、銀行口座に反映されていない金額については、裏付け資料を照合書類に添付していること。 vi) 月末前に総勘定元帳へ計上されていない銀行取引明細書上の金額については、裏付け資料を照合書類に添付していること。',
  52: 'ホテル経営陣は、前月の業績を検証し、ポリシーにより定められた議題について協議するため、毎月 P&L ミーティングを実施すること。 当該ミーティングにおいては、出席者（財務責任者およびオペレーション責任者の出席は必須）、協議内容、決定事項、およびアクションアイテムをまとめた議事録を作成し、月次決算期日までに文書化すること。 これらの記録については、関連する補足資料を含め、適切に保管すること。',
  53: 'ポジション変更や退職などの理由で不要となったアクセス権が48時間以内に削除されていることを確認する。',
  54: '以下の該当するすべてのシステムについて、汎用ユーザー（ジェネリックユーザー）アカウントのレビューを実施すること： 総勘定元帳（GL）システム、OnQ OA、給与計算システム、PROPPLAN、POS、PMS、購買システム、DocMX、銀行ポータル。 汎用ユーザーが存在する場合には、業務上の正当な理由および適切な承認が整備されていることを確認すること。 なお、汎用ユーザーはベンダーサポート／トラブルシューティング目的に限定されるものとし、ホテル（プロパティ）側からはアクセスできない状態であること。',
  55: 'システム生成レポートがユーザーアクセスレビュー（UAR）に使用されていることを確認し、以下の該当するすべてのシステムについて、ユーザーに付与されているアクセス権限（割り当てられているユーザープロファイル／グループを含む）が適切であること、ならびに当該アクセス内容がアプリケーションオーナーによってレビューおよび承認されていることを検証すること。 対象システム：総勘定元帳（GL）システム、OnQ OA、給与計算システム、PROPPLAN、POS、PMS、購買システム、DocMX、銀行ポータル。 注: 該当するシステム生成レポートについては、UAR ガイドを参照すること。',
  56: 'UARレビュアーがシステム管理者を兼務していないことを確認する。 対象システム：総勘定元帳（GL）システム、OnQ OA、給与計算システム、PROPPLAN、POS、PMS、購買システム、DocMX、銀行ポータル。 注: OAとPROPPLANのUARはAFCもしくはGMが実施すること。',
  57: '最新の四半期ユーザーアクセスレビュー（UAR）が完了していることを確認する。また、以下の該当するすべてのシステムについて、当該レビューが四半期終了後の翌月15日以内に実施されていることを確認すること。 対象システム：総勘定元帳（GL）システム、OnQ OA、給与計算システム、PROPPLAN、POS、PMS、購買システム、DocMX、銀行ポータル。',
  58: 'ホテルの FF&E 銀行口座ならびに資金積立が、MA／BAMA に完全に準拠しているかを確認すること。 i) MA に基づき、専用の銀行口座が設置されていること。 ii) 該当する FF&E リザーブ口座について、マネジメント契約または賃貸借契約に従い、資金が拠出されていること。 iii) FF&E 銀行口座の残高が、対応する貸借対照表（BS）勘定と定期的に照合されており、差異が生じた場合には速やかに調査が行われていること。',
  59: '過去12か月以内に、MAによる規定範囲外のオーナーによる銀行の払出、オーナーとの直接取引がないことを確認する。',
  60: '現在の銀行署名権限者一覧をレビューし、各承認グループのメンバーが適切であること、ならびに署名権限者として不適切な従業員が含まれていないことを確認すること。 また、支払承認がマネジメント契約に従って実施されていること。例えば、マネジメント契約により定められていない限り、オーナー承認が不要であることを確認すること。',
  61: 'FF&Eの引当および処理がMA/BAMA上のFF&Eの定義に従っており、リージョナルの計上ガイドラインに沿って記録されていることを確認する。',
  62: 'ホテル運営に必要な許認可が取得されていることを確認する。',
  63: 'i) 職務分掌（SOD）マトリクスが、財務責任者または ADOF により、年2回（第2四半期および第4四半期）、もしくは役割／職務内容に変更が生じた都度作成・更新され、会計年度を通じて適切な職務分離が確保されていることを確認すること。 ii) 最新の SOD マトリクスをレビューし、エラーや不適切な行為のリスクを低減するために、業務が適切に分担・分離されていることを確認すること。職務の相反が存在する場合には、補完する統制計画が RFD により承認されていることを確認すること。',
  64: '給与変更レポートのレビューにおいて重複銀行口座の確認が実施されていることを確認する。特定された重複口座については調査が行われていること。',
  65: '2か月以内の1給与期間分の給与変更レポートをレビューし、当該レポートが財務責任者によりレビューおよび承認されていることを確認すること。 すべての給与記録は、安全かつ施錠された場所に保管または同等の制限付き電子ファイルに保管され、アクセス権は権限を付与されたチームメンバー（例：財務部門、人事部門等）に限定されていること。',
  66: '給与変更レポートに記載されたすべての給与変更（採用、退職、給与/賃金の増額、銀行口座情報の変更等）について、承認済みの変更申請書／人事アクションフォーム（PAF）等と一致していることを確認すること。 また、給与変更レポートと補足資料との間に不一致がある場合には、その内容が文書化され、次の給与期間の終了までに解消されていることを確認すること。',
  67: '2か月以内の各給与期間について、ペイロール登録簿（または同等のレポート）をレビューし、当該ペイロール登録簿が支払実行の承認前に財務責任者（または指名された担当者）によりレビューおよび承認されていることを確認すること。',
  68: '購買発注書、契約書、サービス契約、賃貸借契約、またはその他の契約形態によるすべての購買コミットメントについて、ヒルトンが承認した法務部門または法律事務所により承認された所定様式で文書化されていること、もしくは別途法務承認を取得していることを確認すること。',
  69: '物品/サービスの購入において、単一供給サプライヤー（ソールソースサプライヤー）を利用し、かつ想定総額が5,000米ドル以上（HSMプログラム対象外）の場合には、当該購入の責任者は、当該サプライヤーからの年間購入見込金額を記載し、競争入札を実施しなかった理由について HSM に通知すること。',
